version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      types:
        patterns: ["@types/*"]
      biome:
        patterns: ["@biomejs/*"]
      commitlint:
        patterns: ["@commitlint/*"]
      typescript:
        patterns: ["typescript"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]
