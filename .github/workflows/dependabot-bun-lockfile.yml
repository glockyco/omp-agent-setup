name: Dependabot bun.lock sync

# Dependabot does not natively understand Bun's lockfile, so its npm PRs
# touch package.json but leave bun.lock inconsistent. This workflow runs
# `bun install` on each Dependabot PR that modifies package.json and pushes
# the regenerated lockfile back onto the same branch so CI's
# `bun install --frozen-lockfile` gate passes without manual intervention.

on:
  pull_request:
    paths:
      - package.json

permissions:
  contents: write
  pull-requests: read

jobs:
  sync-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version-file: .bun-version
      - name: Regenerate bun.lock
        run: bun install
      - name: Commit if lockfile changed
        run: |
          if [ -n "$(git status --porcelain bun.lock)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bun.lock
            git commit -m "chore(deps): regenerate bun.lock"
            git push
          fi
