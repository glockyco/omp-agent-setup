[install]
# Bun resolves to lockfile entries by default. Set exact=true if we ever want
# semver pinning enforced for new adds.
exact = false

[test]
coverage = true
coverageReporter = ["text"]
coverageSkipTestFiles = true
coveragePathIgnorePatterns = ["src/cli.ts", "src/*-runtime.ts", "tests/setup.ts"]
coverageThreshold = 0.8
preload = ["./tests/setup.ts"]
